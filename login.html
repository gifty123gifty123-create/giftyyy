<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysea - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
        }

        /* VIDEO */
        .back-video {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            filter: brightness(0.65);
        }

        /* PARTICLES */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 100px 50px, rgba(247,202,201,0.4), transparent),
                radial-gradient(2px 2px at 300px 250px, rgba(223,190,159,0.4), transparent),
                radial-gradient(2px 2px at 500px 300px, rgba(183,110,121,0.4), transparent);
            background-size: 550px 400px;
            animation: floatParticles 20s linear infinite;
        }

        @keyframes floatParticles {
            0% { transform: translateY(0); }
            100% { transform: translateY(-400px); }
        }

        /* ✅ HEADER (UNCHANGED ORIGINAL) */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(183, 110, 121, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .navbar {
            display: flex;
            gap: 60px;
        }

        .navbar a {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #7a3f48, #b76e79, #9a6a54, #7a3f48);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            transition: 0.3s ease;
        }

        .navbar a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0%;
            height: 2px;
            background: linear-gradient(to right, #b76e79, #f7cac9, #dfbe9f);
            transition: 0.3s ease;
        }

        .navbar a:hover::after { width: 100%; }
        .navbar a:hover { filter: drop-shadow(0 0 10px rgba(247, 202, 201, 0.6)); }

        /* 💎 ULTRA CLEAR GLASS FORM */
        .wrapper {
            width: 420px;
            padding: 45px 40px;
            border-radius: 25px;
            text-align: center;
            position: relative;
            z-index: 10;
            margin-top: 40px;

            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);

            border: 1px solid rgba(255, 255, 255, 0.15);

            box-shadow: 
                0 5px 20px rgba(0, 0, 0, 0.3),
                inset 0 0 6px rgba(255, 255, 255, 0.05);

            transition: 0.5s ease;
        }

        .wrapper:hover {
            transform: translateY(-5px);
        }

        .wrapper h1 {
            font-family: 'Cinzel', serif;
            font-size: 42px;
            letter-spacing: 6px;
            margin-bottom: 35px;
            text-transform: uppercase;
            background: linear-gradient(to right, #b76e79, #f7cac9, #dfbe9f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* INPUTS */
        .input-box {
            position: relative;
            width: 100%;
            height: 55px;
            margin: 25px 0;
        }

        .input-box input {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            font-size: 16px;
            padding: 20px 50px 20px 25px;
            outline: none;

            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(2px);

            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f7cac9;

            transition: 0.4s;
        }

        .input-box input::placeholder {
            color: rgba(247, 202, 201, 0.5);
        }

        .input-box input:focus {
            border-color: #f7cac9;
            background: rgba(255,255,255,0.06);
        }

        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #b76e79;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin: 20px 0 30px;
        }

        .remember-forgot label, 
        .remember-forgot a, 
        .register-link p, 
        .register-link a {
            color: #f7cac9;
            opacity: 0.8;
        }

        .btn {
            width: 100%;
            height: 55px;
            border-radius: 35px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;

            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px);

            border: 1px solid rgba(255,255,255,0.2);
            color: #f7cac9;

            transition: 0.4s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 15px rgba(183,110,121,0.3);
        }

        .register-link { margin-top: 25px; }

        @media(max-width: 768px) {
            .navbar { gap: 20px; }
            .wrapper { width: 90%; }
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="back-video">
        <source src="atheraorg.mp4" type="video/mp4">
    </video>

    <div class="particles"></div>

    <header class="header">
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="products.html">Products</a>
            <a href="about.html#contact">Contact</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <div class="wrapper">
        <form action="">
            <h1>Elysea</h1>

            <div class="input-box">
                <input type="text" placeholder="Username" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="remember-forgot">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="register-link">
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>
        </form>
    </div>

    <script src="elysea-cart.js"></script>
</body>
</html>
